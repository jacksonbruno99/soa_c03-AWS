 c:1,e:"CloudTrail Event History only retains 90 days. For long-term retention, create a Trail that continuously delivers to S3. Log file validation ensures integrity. VPC Flow Logs capture network metadata, not API calls. Config records configuration changes but not who made API calls. Logs Insights can query logs but doesn't solve the retention problem."},

{id:"task11",label:"Task 1.1 – Metrics & Alarms",
 title:"Task 1.1: Metrics, alarms, and filters",sub:"The foundation of everything — know this cold",
 html:`
<div class="cgrid">
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">CloudWatch metrics fundamentals</span><span class="badge" style="background:#E6F1FB;color:#0C447C">Core</span></div>
<div class="cb">
<strong>Namespace:</strong> logical grouping, e.g. AWS/EC2, AWS/RDS, your own custom namespace.<br><br>
<strong>Metric:</strong> a time-series data point, e.g. CPUUtilization.<br><br>
<strong>Dimension:</strong> a name/value pair that identifies what produced the metric, e.g. InstanceId=i-abc123.<br><br>
<strong>Standard vs Detailed monitoring:</strong> Standard = 5-min intervals (free). Detailed = 1-min intervals (paid, must be explicitly enabled on EC2).<br><br>
<strong>Custom metrics:</strong> pushed via PutMetricData API. Resolution can be standard (60s) or high-resolution (1s — set StorageResolution=1). High-resolution alarms can evaluate as frequently as every 10 seconds.
</div>
</div>
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">CloudWatch alarm states and actions</span><span class="badge" style="background:#E6F1FB;color:#0C447C">Core</span></div>
<div class="cb">
<strong>Three states:</strong> OK, ALARM, INSUFFICIENT_DATA.<br><br>
<strong>Evaluation period:</strong> how many data points are collected before evaluating the threshold.<br><br>
<strong>Datapoints to alarm:</strong> how many of those must breach to trigger ALARM. e.g. "3 out of 5" = M out of N evaluation.<br><br>
<strong>Actions you can trigger:</strong><br>
• SNS notification (→ email, SMS, Lambda)<br>
• Auto Scaling: scale out or in<br>
• EC2 action: stop, terminate, reboot, recover<br>
• Systems Manager OpsItem<br><br>
<strong>Composite alarms:</strong> combine multiple alarms with AND/OR logic to reduce noise. One composite alarm triggers a single action instead of many individual alarms firing at once.
</div>
</div>
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">Metric filters on log groups</span><span class="badge" style="background:#E1F5EE;color:#085041">Important</span></div>
<div class="cb">
Metric filters turn <em>log data</em> into <em>CloudWatch metrics</em>.<br><br>
<strong>Workflow:</strong> log group → create filter with pattern → filter publishes a count to a custom metric → set alarm on that metric.<br><br>
<strong>Pattern examples:</strong><br>
• <code>[ERROR]</code> matches lines containing ERROR<br>
• <code>[status=5*]</code> matches 5xx HTTP status codes<br>
• <code>{ $.errorCode = "AccessDenied" }</code> for JSON logs<br><br>
<strong>Exam gotcha:</strong> metric filters only apply to <em>new</em> log events after creation — they do not backfill historical data.
</div>
</div>
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">Contributor Insights</span><span class="badge" style="background:#FAEEDA;color:#633806">Know it</span></div>
<div class="cb">
Analyses log data to find the <em>top contributors</em> to operational problems — designed for high-cardinality data like IP addresses, user agents, or customer IDs.<br><br>
<strong>Works with:</strong> CloudWatch Logs, DynamoDB (built-in), API Gateway access logs, VPC Flow Logs.<br><br>
<strong>Exam tip:</strong> if the question asks "how do you find which IPs/users are causing the most traffic or errors?", the answer is Contributor Insights — not Logs Insights, which is for ad-hoc querying.
</div>
</div>
</div>
<div class="tip"><strong>Memorise this chain:</strong> EC2 CPUUtilization (Detailed Monitoring ON, 1-min data) → CloudWatch Alarm with 3/5 M-of-N breach → SNS topic → email + Lambda for auto-remediation.</div>
<table class="tbl">
<tr><th>Scenario</th><th>Right solution</th></tr>
<tr><td>Alert when CPU stays above 80% for 10 min</td><td>Alarm on CPUUtilization, period=300s, threshold=80, datapoints=2/2</td></tr>
<tr><td>Reduce noise from 20 alarms firing at once</td><td>Composite Alarm with AND/OR logic, single SNS action</td></tr>
<tr><td>Alert on application-level error rate from logs</td><td>Metric filter → custom metric → CloudWatch Alarm</td></tr>
<tr><td>Find top 10 IPs causing 4xx errors</td><td>Contributor Insights rule on access log group</td></tr>
<tr><td>Alert within seconds (sub-minute)</td><td>High-resolution custom metric (StorageResolution=1) + 10s alarm period</td></tr>
</table>`},

{id:"task12",label:"Task 1.2 – Logs & Tracing",
 title:"Task 1.2: Collect, analyse, and manage log data",sub:"Know which log source tells you what — and how to query it",
 html:`
<table class="tbl">
<tr><th>Log source</th><th>What it captures</th><th>Key detail</th></tr>
<tr><td>CloudTrail</td><td>AWS API calls (who, what, from where, when)</td><td>Event History = 90 days only. For longer retention, create a Trail → S3. Enable multi-region trail for org-wide coverage.</td></tr>
<tr><td>VPC Flow Logs</td><td>Network traffic metadata per ENI/subnet/VPC</td><td>Records source/dest IP, port, protocol, bytes, ACCEPT/REJECT. Does NOT capture packet contents or DNS queries.</td></tr>
<tr><td>CloudWatch Logs</td><td>App logs, OS logs, Lambda logs, custom logs</td><td>Use CloudWatch Unified Agent (newer, recommended over Logs Agent). Set retention policies — default is never-expire (costly).</td></tr>
<tr><td>X-Ray</td><td>End-to-end traces for distributed applications</td><td>Requires SDK instrumentation or X-Ray daemon. Produces service maps and trace IDs. Sampling is on by default (5% + first req/sec).</td></tr>
<tr><td>ALB / S3 / CloudFront access logs</td><td>HTTP request details per service</td><td>ALB logs to S3. Query with Athena. Distinct from CloudWatch Logs.</td></tr>
</table>
<div style="font-size:13px;font-weight:500;margin:14px 0 8px">CloudWatch Logs Insights — key query syntax</div>
<div class="cgrid">
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">Core Logs Insights commands</span><span class="badge" style="background:#E6F1FB;color:#0C447C">Exam-tested</span></div>
<div class="cb">
<code>fields @timestamp, @message</code> — select fields<br>
<code>filter @message like /ERROR/</code> — filter by pattern<br>
<code>stats count(*) by bin(5m)</code> — aggregate over time<br>
<code>stats avg(duration) by requestId</code> — average by group<br>
<code>sort @timestamp desc</code> — sort results<br>
<code>limit 20</code> — cap result count<br><br>
<strong>Exam tip:</strong> Logs Insights is for ad-hoc analysis. For <em>ongoing alerting from logs</em>, use metric filters. Questions test whether you know when to use each.
</div>
</div>
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">Log retention and real-time export</span><span class="badge" style="background:#FAECE7;color:#712B13">Common trap</span></div>
<div class="cb">
<strong>Default retention:</strong> Never expires — logs accumulate and incur ongoing cost.<br><br>
<strong>Best practice:</strong> Set retention policy per log group (1 day to 10 years).<br><br>
<strong>Export to S3:</strong> CreateExportTask = one-time batch export, takes <strong>up to 12 hours</strong>. NOT real-time.<br><br>
<strong>For near-real-time streaming to S3:</strong> use a Subscription Filter → Kinesis Data Firehose → S3.<br><br>
<strong>Exam trap:</strong> if the question says "stream logs to S3 in near-real-time", the answer is always Firehose, never CreateExportTask.
</div>
</div>
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">X-Ray tracing concepts</span><span class="badge" style="background:#E1F5EE;color:#085041">Important</span></div>
<div class="cb">
<strong>Trace:</strong> end-to-end record of one request across all services.<br>
<strong>Segment:</strong> one service's contribution to a trace.<br>
<strong>Subsegment:</strong> detail within a segment (e.g. a downstream call or SQL query).<br>
<strong>Annotations:</strong> indexed key-value pairs you can filter on in the console.<br>
<strong>Metadata:</strong> non-indexed additional data for debugging.<br><br>
<strong>Sampling:</strong> default = 5% of requests + first request per second per host. Customise sampling rules for higher-traffic services.<br><br>
<strong>Service map:</strong> shows all services, avg latency and error rate on each connection.
</div>
</div>
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">CloudTrail event types</span><span class="badge" style="background:#E6F1FB;color:#0C447C">Core</span></div>
<div class="cb">
<strong>Management events:</strong> API calls that manage AWS resources (on by default). e.g. RunInstances, DeleteBucket, CreateUser.<br><br>
<strong>Data events:</strong> object-level operations. e.g. S3 GetObject/PutObject, Lambda Invoke. Off by default, extra cost.<br><br>
<strong>Insights events:</strong> detect unusual API call patterns (e.g. sudden spike in TerminateInstances calls).<br><br>
<strong>Log file validation:</strong> enable to detect if log files were tampered with after delivery to S3.
</div>
</div>
</div>
<div class="warn"><strong>CloudTrail vs CloudWatch Logs:</strong> CloudTrail = AWS API/audit events (who called what AWS API). CloudWatch Logs = application and system logs. "Who deleted the S3 bucket?" → CloudTrail. "Why is the app returning 500 errors?" → CloudWatch Logs.</div>`},

{id:"task13",label:"Task 1.3 – Remediation",
 title:"Task 1.3: Remediate issues and optimise performance",sub:"Automate the response — this is what separates CloudOps from just monitoring",
 html:`
<div class="cgrid">
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">EventBridge — event-driven remediation</span><span class="badge" style="background:#E6F1FB;color:#0C447C">Core</span></div>
<div class="cb">
EventBridge is the glue between AWS events and automated actions.<br><br>
<strong>Event sources:</strong><br>
• AWS service events: EC2 state change, S3 object created, etc.<br>
• CloudWatch Alarm state changes<br>
• Scheduled (cron) events<br>
• Custom events from your own applications<br><br>
<strong>Common targets:</strong> Lambda, SSM Automation, Step Functions, SNS, SQS, CodePipeline.<br><br>
<strong>Exam pattern:</strong> "Alert fires → automatically restart EC2" → EventBridge rule on alarm state change → SSM Automation document <em>AWS-RestartEC2Instance</em> as target.
</div>
</div>
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">AWS Config — compliance and auto-remediation</span><span class="badge" style="background:#E6F1FB;color:#0C447C">Core</span></div>
<div class="cb">
Config continuously records resource configuration changes and evaluates them against rules.<br><br>
<strong>Managed rule examples:</strong><br>
• <code>restricted-ssh</code> — no security group allows port 22 open to 0.0.0.0/0<br>
• <code>s3-bucket-public-read-prohibited</code><br>
• <code>encrypted-volumes</code> — all EBS volumes must be encrypted<br>
• <code>required-tags</code><br><br>
<strong>Auto-remediation:</strong> Config rule fires NON_COMPLIANT → triggers SSM Automation document automatically. e.g. S3 bucket goes public → Config → SSM sets it back to private.<br><br>
<strong>Conformance packs:</strong> bundles of Config rules + remediation actions, e.g. CIS AWS Benchmark, NIST, PCI DSS.
</div>
</div>
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">Compute Optimizer vs Trusted Advisor</span><span class="badge" style="background:#FAEEDA;color:#633806">Know it</span></div>
<div class="cb">
<strong>Compute Optimizer:</strong> uses ML on CloudWatch metrics to recommend right-sized resources for EC2, EBS, Lambda, ECS on Fargate, and Auto Scaling groups. Requires 14+ days of metric data. Opt-in required. Gives specific resize recommendations with estimated savings.<br><br>
<strong>Trusted Advisor:</strong> broad best-practice checks across five categories: cost, performance, security, fault tolerance, service limits. Basic support = 7 checks only. Business/Enterprise = all checks + API access.<br><br>
<strong>Key difference:</strong> Compute Optimizer = deep right-sizing from your <em>actual usage patterns</em>. Trusted Advisor = broad best-practice scan across all five Well-Architected pillars.
</div>
</div>
<div class="card">
<div class="ch" onclick="tog(this)"><span class="cht">EFS and FSx storage optimisation</span><span class="badge" style="background:#FAEEDA;color:#633806">Know it</span></div>
<div class="cb">
<strong>EFS lifecycle policies:</strong> automatically move files not accessed in N days to EFS-IA (Infrequent Access) — 92% cheaper than standard EFS. Files move back to Standard when accessed again.<br><br>
<strong>EFS performance modes:</strong><br>
• General Purpose (default): low latency, good for web serving, CMS<br>
• Max I/O: higher throughput, slightly higher latency — for massively parallel workloads<br><br>
<strong>FSx for Windows:</strong> SMB protocol, Windows ACLs, Active Directory integration → lift-and-shift Windows file shares.<br><br>
<strong>FSx for Lustre:</strong> high-performance, native S3 integration → ML training data, HPC, media processing.
</div>
</div>
</div>
<div style="font-size:13px;font-weight:500;margin:14px 0 8px">Remediation flows</div>
<div class="frow">
<div class="fb" style="background:#E6F1FB;color:#0C447C">CloudWatch Alarm<br><span style="font-size:11px;font-weight:400">threshold breached</span></div>
<div class="fa">→</div>
<div class="fb" style="background:#E1F5EE;color:#085041">EventBridge Rule<br><span style="font-size:11px;font-weight:400">alarm state change</span></div>
<div class="fa">→</div>
<div class="fb" style="background:#EEEDFE;color:#3C3489">SSM Automation<br><span style="font-size:11px;font-weight:400">runbook executes</span></div>
<div class="fa">→</div>
<div class="fb" style="background:#EAF3DE;color:#27500A">Resource fixed<br><span style="font-size:11px;font-weight:400">alarm returns OK</span></div>
</div>
<div class="frow">
<div class="fb" style="background:#FAECE7;color:#712B13">Config rule<br><span style="font-size:11px;font-weight:400">NON_COMPLIANT</span></div>
<div class="fa">→</div>
<div class="fb" style="background:#EEEDFE;color:#3C3489">SSM Automation<br><span style="font-size:11px;font-weight:400">auto-remediation</span></div>
<div class="fa">→</div>
<div class="fb" style="background:#EAF3DE;color:#27500A">COMPLIANT<br><span style="font-size:11px;font-weight:400">config restored</span></div>
</div>`},

 title:"Domain 1 practice questions",sub:"5 exam-style scenarios — pick an answer before reading the explanation",

<div class="qb" id="qb${i}">

{id:"tips",label:"Exam Tips & Traps",
 title:"Domain 1 exam tips and common traps",sub:"The distinctions that trip people up most often",
 html:`
<div style="display:flex;flex-direction:column;gap:8px">
<div class="warn"><strong>Trap 1 — Monitoring intervals:</strong> EC2 standard monitoring = every 5 minutes. For 1-minute data you must explicitly enable Detailed Monitoring. Custom metrics can go to 1-second with high-resolution. "Need sub-5-minute data" → Detailed Monitoring or high-resolution custom metrics.</div>
<div class="warn"><strong>Trap 2 — Logs Insights vs metric filters:</strong> Logs Insights = ad-hoc interactive querying (like SQL on your logs). Metric filters = convert log patterns into ongoing CloudWatch metrics + alarms. "Notify when errors exceed X per minute" → metric filter. "Investigate last night's errors" → Logs Insights.</div>
<div class="warn"><strong>Trap 3 — CloudTrail 90-day limit:</strong> Event History only retains 90 days. For compliance or audit older than 90 days, you must create a Trail that delivers to S3. "Audit API calls from 6 months ago" always requires a Trail → S3.</div>
<div class="warn"><strong>Trap 4 — VPC Flow Logs do NOT capture everything:</strong> They miss DNS queries to Route 53 Resolver, DHCP traffic, instance metadata (169.254.169.254), and AWS Time Sync traffic. "Why are DNS queries failing?" → Route 53 Resolver query logging, not VPC Flow Logs.</div>
<div class="warn"><strong>Trap 5 — Config vs CloudTrail:</strong> Config = "what did this resource look like over time, is it compliant?" CloudTrail = "who made this API call?" "Who changed this security group?" → CloudTrail. "Was this security group ever non-compliant?" → Config.</div>
<div class="warn"><strong>Trap 6 — Log export latency:</strong> CreateExportTask (CloudWatch Logs → S3) can take up to 12 hours. NOT real-time. For near-real-time streaming to S3 or Splunk, use Subscription Filter → Kinesis Data Firehose → S3.</div>
</div>
<div style="font-size:13px;font-weight:500;margin:16px 0 8px">Quick-fire cheat sheet</div>
<table class="tbl">
<tr><th>Question trigger</th><th>Answer</th></tr>
<tr><td>"Who made this API call / deleted this resource?"</td><td>CloudTrail</td></tr>
<tr><td>"Why is traffic being rejected at network level?"</td><td>VPC Flow Logs</td></tr>
<tr><td>"Which Lambda / service is causing latency?"</td><td>AWS X-Ray</td></tr>
<tr><td>"Which IPs / users cause most traffic or errors?"</td><td>Contributor Insights</td></tr>
<tr><td>"Alert me when logs contain ERROR"</td><td>Metric filter → CloudWatch Alarm</td></tr>
<tr><td>"Query logs for specific patterns"</td><td>CloudWatch Logs Insights</td></tr>
<tr><td>"Auto-fix a misconfigured resource"</td><td>Config rule + SSM auto-remediation</td></tr>
<tr><td>"Is my EC2 instance right-sized?"</td><td>Compute Optimizer</td></tr>
<tr><td>"Reduce alarm noise from many alarms"</td><td>Composite Alarm</td></tr>
<tr><td>"Stream logs to S3 in near-real-time"</td><td>Subscription filter → Kinesis Firehose → S3</td></tr>
</table>
<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
<button class="nb" onclick="sendPrompt('Give me 5 more hard practice questions for Domain 1 of SOA-C03')">More practice questions ↗</button>
<button class="nb" onclick="sendPrompt('Teach me Domain 2 of SOA-C03 (Reliability and Business Continuity) in depth with examples and exam tips')">Next: Domain 2 ↗</button>
</div>`}
];

function tog(h){const b=h.nextElementSibling;b.classList.toggle('on')}
function ans(qi,oi){
  const q=QS[qi];
  document.querySelectorAll('#qb'+qi+' .qopt').forEach((o,j)=>{
    o.disabled=true;
    if(j===q.c)o.classList.add('ok2');
    else if(j===oi&&j!==q.c)o.classList.add('bad');
  });
  const ex=document.getElementById('qe'+qi);
  ex.innerHTML='<strong>'+(oi===q.c?'Correct!':'Incorrect.')+'</strong> '+q.e;
  ex.classList.add('on');
}
window.tog=tog;window.ans=ans;

let cur=Number(localStorage.getItem('soaDomain1Page') || 0);
if(!Number.isInteger(cur) || cur < 0 || cur >= PAGES.length) cur = 0;
function go(i){
  if(i<0||i>=PAGES.length)return;
  cur=i;
  localStorage.setItem('soaDomain1Page', String(cur));
  document.querySelectorAll('.pg').forEach((p,j)=>p.classList.toggle('on',j===i));
  document.querySelectorAll('.pill').forEach((p,j)=>p.classList.toggle('on',j===i));
}
window.go=go;

const pEl=document.getElementById('pills');
const cEl=document.getElementById('content');
PAGES.forEach((p,i)=>{
  const btn=document.createElement('button');
  btn.className='pill'+(i===0?' on':'');
  btn.textContent=p.label;
  btn.onclick=()=>go(i);
  pEl.appendChild(btn);
  const pg=document.createElement('div');
  pg.className='pg'+(i===0?' on':'');
  pg.innerHTML=`<div class="pt">${p.title}</div><div class="ps">${p.sub}</div>${p.html}
<div class="nr">
<button class="nb" onclick="go(${i-1})" ${i===0?'disabled':''}>← Back</button>
<div class="dots">${PAGES.map((_,j)=>`<div class="dot${j===i?' on':''}" onclick="go(${j})"></div>`).join('')}</div>
<button class="nb" onclick="go(${i+1})" ${i===PAGES.length-1?'disabled':''}>Next →</button>
</div>`;
  cEl.appendChild(pg);
});
go(cur);
</script>
