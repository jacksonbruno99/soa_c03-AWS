let searchIndexPromise;

function escapeHTML(value){
  return String(value).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function textFromHTML(html){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  doc.querySelectorAll('script,style,noscript,svg').forEach(el => el.remove());
  return (doc.body.textContent || '').replace(/\s+/g, ' ').trim();
}
async function buildSearchIndex(){
  const docs = await Promise.all(SEARCH_DOCS.map(async item => {
    try{
      const res = await fetch(item.href, {cache:'force-cache'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const html = await res.text();
      return {...item, text:textFromHTML(html)};
    }catch(err){
      return {...item, text:'', error:true};
    }
  }));
  return docs;
}
function makeSnippet(text, terms){
  const lower = text.toLowerCase();
  const first = terms.map(t => lower.indexOf(t)).filter(i => i >= 0).sort((a,b) => a-b)[0] ?? 0;
  const start = Math.max(0, first - 90);
  const end = Math.min(text.length, first + 210);
  let snippet = escapeHTML((start ? '... ' : '') + text.slice(start, end) + (end < text.length ? ' ...' : ''));
  terms.forEach(term => {
    const safe = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    snippet = snippet.replace(new RegExp(`(${safe})`, 'ig'), '<mark>$1</mark>');
  });
  return snippet;
}
function openCourseSearch(){
  const overlay = document.getElementById('course-search');
  overlay.hidden = false;
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('course-search-input')?.focus(), 40);
}
function closeCourseSearch(){
  document.getElementById('course-search').hidden = true;
  document.body.style.overflow = '';
}
function queueCourseSearch(){
  clearTimeout(searchTimer);
  searchTimer = setTimeout(runCourseSearch, 180);
}
async function runCourseSearch(){
  const input = document.getElementById('course-search-input');
  const status = document.getElementById('course-search-status');
  const resultsEl = document.getElementById('course-search-results');
  const query = (input.value || '').trim().toLowerCase();
  resultsEl.innerHTML = '';
  if(query.length < 2){
    status.textContent = 'Type at least 2 characters to search.';
    return;
  }
  status.textContent = 'Searching course pages...';
  searchIndexPromise ||= buildSearchIndex();
  const docs = await searchIndexPromise;
  const terms = query.split(/\s+/).filter(Boolean);
  const results = docs.map(doc => {
    const haystack = (doc.title + ' ' + doc.text).toLowerCase();
    const phraseHit = haystack.includes(query);
    const termHits = terms.filter(term => haystack.includes(term)).length;
    const matched = phraseHit || termHits === terms.length;
    return matched ? {...doc, score:(phraseHit ? 5 : 0) + termHits, snippet:makeSnippet(doc.text || doc.title, terms)} : null;
  }).filter(Boolean).sort((a,b) => b.score - a.score || a.title.localeCompare(b.title));
  const failed = docs.filter(doc => doc.error).length;
  status.textContent = results.length ? `${results.length} result${results.length === 1 ? '' : 's'} found${failed ? ` (${failed} page${failed === 1 ? '' : 's'} unavailable)` : ''}.` : `No result found${failed ? ` (${failed} page${failed === 1 ? '' : 's'} unavailable)` : ''}.`;
  resultsEl.innerHTML = results.map(result => `
    <article class="search-result">
      <div class="search-result-top">
        <div class="search-result-title">${escapeHTML(result.title)}</div>
        <div class="search-result-type">${escapeHTML(result.type)}</div>
      </div>
      <div class="search-snippet">${result.snippet}</div>
      <a class="search-result-link" href="${escapeHTML(result.href)}">Open page</a>
    </article>
  `).join('');
}
